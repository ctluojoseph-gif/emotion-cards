<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情緒卡牌與反思畫布</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
    .card-hover:hover { transform: translateY(-2px); transition: all 0.2s; }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen p-4 md:p-8">
    
    <div v-if="!currentUser" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg text-center">
      <h1 class="text-2xl font-bold text-gray-800 mb-6">情緒卡牌與反思畫布</h1>
      <input v-model="loginName" @keyup.enter="login" type="text" placeholder="請輸入您的姓名或暱稱" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button @click="login" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700">進入畫布</button>
    </div>

    <div v-else class="max-w-7xl mx-auto flex flex-col gap-6">
      
      <div class="bg-white p-6 rounded-xl shadow flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
          <h2 class="text-xl font-bold text-gray-800">歡迎，{{ currentUser }}</h2>
          <p class="text-sm text-gray-500">目前已有 {{ totalNotes }} 張卡牌分享於畫布</p>
        </div>
        <div class="w-full md:w-1/2">
          <div class="flex justify-between text-sm mb-1 font-semibold">
            <span class="text-green-600">正向/高能量 ({{ positivePercent }}%)</span>
            <span class="text-red-500">負向/低能量 ({{ negativePercent }}%)</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-4 flex overflow-hidden">
            <div class="bg-green-500 h-4 transition-all duration-500" :style="{ width: positivePercent + '%' }"></div>
            <div class="bg-red-400 h-4 transition-all duration-500" :style="{ width: negativePercent + '%' }"></div>
          </div>
        </div>
      </div>

      <div class="flex flex-col lg:flex-row gap-6">
        
        <div class="w-full lg:w-1/3 bg-white p-6 rounded-xl shadow h-[80vh] overflow-y-auto">
          <h3 class="text-lg font-bold mb-4 border-b pb-2">1. 選擇你的情緒</h3>
          <div class="flex flex-wrap gap-2">
            <button v-for="card in cards" :key="card.emotion" @click="openNoteModal(card)"
              class="card-hover px-4 py-2 rounded-full border text-sm font-semibold"
              :class="card.type === 'positive' ? 'bg-green-50 border-green-200 text-green-700 hover:bg-green-100' : 'bg-red-50 border-red-200 text-red-700 hover:bg-red-100'">
              {{ card.emotion }}
            </button>
            <button @click="openCustomModal" class="card-hover px-4 py-2 rounded-full border-2 border-dashed border-gray-400 text-gray-600 text-sm font-semibold hover:bg-gray-50">
              + 自訂情緒
            </button>
          </div>
        </div>

        <div class="w-full lg:w-2/3 bg-white p-6 rounded-xl shadow h-[80vh] overflow-y-auto bg-gray-50">
          <h3 class="text-lg font-bold mb-4 border-b pb-2">2. 共同反思畫布</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div v-for="(note, id) in sharedBoard" :key="id" class="bg-white p-4 rounded-lg shadow border-l-4"
              :class="note.type === 'positive' ? 'border-green-500' : 'border-red-400'">
              <div class="flex justify-between items-start mb-2">
                <span class="px-2 py-1 rounded text-xs font-bold"
                  :class="note.type === 'positive' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'">
                  {{ note.emotion }} {{ note.isCustom ? '(自訂)' : '' }}
                </span>
                <span class="text-xs text-gray-400">{{ note.userName }}</span>
              </div>
              <p class="text-gray-700 whitespace-pre-wrap">{{ note.content }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div v-if="showModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
      <div class="bg-white rounded-xl p-6 w-full max-w-md">
        <h3 class="text-xl font-bold mb-4">
          你選擇了：<span :class="currentCard.type === 'positive' ? 'text-green-600' : 'text-red-500'">{{ currentCard.emotion }}</span>
        </h3>
        <textarea v-model="noteContent" rows="4" placeholder="為什麼選擇這個情緒？寫下你的反思..." class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        <div class="flex justify-end gap-2">
          <button @click="showModal = false" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
          <button @click="submitNote" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">釘上畫布</button>
        </div>
      </div>
    </div>

    <div v-if="showCustomModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
      <div class="bg-white rounded-xl p-6 w-full max-w-md">
        <h3 class="text-xl font-bold mb-4">新增自訂情緒</h3>
        <input v-model="customEmotion" type="text" placeholder="輸入情緒詞彙 (例如：百感交集)" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <div class="flex gap-4 mb-4">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" v-model="customType" value="positive"> <span class="text-green-600 font-semibold">正向/高能量</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" v-model="customType" value="negative"> <span class="text-red-500 font-semibold">負向/低能量</span>
          </label>
        </div>
        <textarea v-model="noteContent" rows="3" placeholder="寫下你的反思..." class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        <div class="flex justify-end gap-2">
          <button @click="showCustomModal = false" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
          <button @click="submitCustomNote" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">釘上畫布</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module">
    import { createApp, ref, computed, onMounted } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js'
    import { getDatabase, ref as dbRef, onValue, push, set } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js'

    // ==========================================
    // ⚠️ 請替換為你的 Firebase Config
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyBZH3hJleq3Z8AUitrhQquTcYefi8QZAsU",
  authDomain: "e-emotion-game.firebaseapp.com",
  databaseURL: "https://e-emotion-game-default-rtdb.firebaseio.com",
  projectId: "e-emotion-game",
  storageBucket: "e-emotion-game.firebasestorage.app",
  messagingSenderId: "1073647325618",
  appId: "1:1073647325618:web:b35925080dc0a9471254ab",
  measurementId: "G-9M25319FRG"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);

    createApp({
      setup() {
        const currentUser = ref('');
        const loginName = ref('');
        const sharedBoard = ref({});
        
        const showModal = ref(false);
        const showCustomModal = ref(false);
        const currentCard = ref({});
        const noteContent = ref('');
        const customEmotion = ref('');
        const customType = ref('positive');

        // 預設 50 張情緒卡牌
        const cards = ref([
          { emotion: '充實', type: 'positive' }, { emotion: '振奮', type: 'positive' }, { emotion: '平靜', type: 'positive' }, { emotion: '喜悅', type: 'positive' }, { emotion: '充滿希望', type: 'positive' },
          { emotion: '感恩', type: 'positive' }, { emotion: '豁然開朗', type: 'positive' }, { emotion: '自信', type: 'positive' }, { emotion: '放鬆', type: 'positive' }, { emotion: '滿足', type: 'positive' },
          { emotion: '期待', type: 'positive' }, { emotion: '熱情', type: 'positive' }, { emotion: '驕傲', type: 'positive' }, { emotion: '受到啟發', type: 'positive' }, { emotion: '感到安全', type: 'positive' },
          { emotion: '自由', type: 'positive' }, { emotion: '充滿活力', type: 'positive' }, { emotion: '輕鬆', type: 'positive' }, { emotion: '欣慰', type: 'positive' }, { emotion: '勇敢', type: 'positive' },
          { emotion: '專注', type: 'positive' }, { emotion: '樂觀', type: 'positive' }, { emotion: '被理解', type: 'positive' }, { emotion: '溫暖', type: 'positive' }, { emotion: '踏實', type: 'positive' },
          { emotion: '疲憊', type: 'negative' }, { emotion: '困惑', type: 'negative' }, { emotion: '焦慮', type: 'negative' }, { emotion: '沮喪', type: 'negative' }, { emotion: '緊張', type: 'negative' },
          { emotion: '無力', type: 'negative' }, { emotion: '孤單', type: 'negative' }, { emotion: '壓力大', type: 'negative' }, { emotion: '煩躁', type: 'negative' }, { emotion: '迷惘', type: 'negative' },
          { emotion: '失落', type: 'negative' }, { emotion: '生氣', type: 'negative' }, { emotion: '擔憂', type: 'negative' }, { emotion: '害怕', type: 'negative' }, { emotion: '沉重', type: 'negative' },
          { emotion: '不安', type: 'negative' }, { emotion: '委屈', type: 'negative' }, { emotion: '挫折', type: 'negative' }, { emotion: '猶豫', type: 'negative' }, { emotion: '煩惱', type: 'negative' },
          { emotion: '枯燥', type: 'negative' }, { emotion: '緊繃', type: 'negative' }, { emotion: '提心吊膽', type: 'negative' }, { emotion: '失望', type: 'negative' }, { emotion: '疲倦', type: 'negative' }
        ]);

        const login = () => {
          if (loginName.value.trim()) {
            currentUser.value = loginName.value.trim();
          }
        };

        const openNoteModal = (card) => {
          currentCard.value = card;
          noteContent.value = '';
          showModal.value = true;
        };

        const openCustomModal = () => {
          customEmotion.value = '';
          customType.value = 'positive';
          noteContent.value = '';
          showCustomModal.value = true;
        };

        // 寫入 Firebase 資料庫
        const pushToDatabase = (emotionData) => {
          const notesRef = dbRef(db, 'notes');
          const newNoteRef = push(notesRef);
          set(newNoteRef, {
            ...emotionData,
            userName: currentUser.value,
            content: noteContent.value,
            timestamp: Date.now()
          });
        };

        const submitNote = () => {
          if (!noteContent.value.trim()) return alert('請填寫反思內容！');
          pushToDatabase({
            emotion: currentCard.value.emotion,
            type: currentCard.value.type,
            isCustom: false
          });
          showModal.value = false;
        };

        const submitCustomNote = () => {
          if (!customEmotion.value.trim() || !noteContent.value.trim()) return alert('情緒與反思內容皆必填！');
          pushToDatabase({
            emotion: customEmotion.value.trim(),
            type: customType.value,
            isCustom: true
          });
          showCustomModal.value = false;
        };

        // 即時監聽 Firebase 資料
        onMounted(() => {
          const notesRef = dbRef(db, 'notes');
          onValue(notesRef, (snapshot) => {
            const data = snapshot.val();
            sharedBoard.value = data || {};
          });
        });

        // 計算類別統計
        const totalNotes = computed(() => Object.keys(sharedBoard.value).length);
        
        const positivePercent = computed(() => {
          if (totalNotes.value === 0) return 50;
          const posCount = Object.values(sharedBoard.value).filter(n => n.type === 'positive').length;
          return Math.round((posCount / totalNotes.value) * 100);
        });

        const negativePercent = computed(() => {
          if (totalNotes.value === 0) return 50;
          return 100 - positivePercent.value;
        });

        return {
          currentUser, loginName, login, cards, sharedBoard,
          showModal, currentCard, noteContent, openNoteModal, submitNote,
          showCustomModal, customEmotion, customType, openCustomModal, submitCustomNote,
          totalNotes, positivePercent, negativePercent
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
